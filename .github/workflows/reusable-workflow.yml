name: Reusable Workflow
on:
    workflow_call:
      inputs:
        PROJECT:
            required: true
            type: string
        VERSION:
          required: false
          type: number
      secrets:
        AWS_REGION:
          required: false
jobs:
    intro_step:
        runs-on: ubuntu-latest
        steps:
          - name: First_step
            run: echo "This is ${{ inputs.PROJECT }} of version - ${{ inputs.VERSION }}"
          - name: Secrets accessing
            run: echo ${{ secrets.AWS_REGION }}
    