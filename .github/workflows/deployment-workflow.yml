name: Deployment_workflow
on:
    push:
    workflow_dispatch:
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v4

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v6.1.0
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ secrets.AWS_REGION }}

            - name: Install kubectl CLI
              id: install-kubectl
              uses: Azure/setup-kubectl@v5.0.0
              with:
                version: 'v1.35.0'

            - name: Set kubeConfig
              uses: Azure/k8s-set-context@v5.0.0
              with:
                method: kubeconfig
                kubeconfig: ${{ secrets.KUBECONFIG }}

            # - name: Setup Minikube
            #   uses: manusa/actions-setup-minikube@v2.16.1
            #   with:
            #     minikube version: 'v1.38.1'
            #     kubernetes version: 'v1.35.2'
            #     github token: ${{ secrets.GITHUB_TOKEN }}
            
            - name: Check kubectl installition
              run: |
                  kubectl version 
                  echo "___________________________________________________________________"
                  kubectl get nodes
                  kubectl get deploy
                  kubectl get pods
                  docker ps
                  docker images


            # - name: Saving Ingress IP as github env variable
            #   run: |
            #     echo "INGRESS_IP=$(kubectl -n ingress-nginx get services ingress-nginx-controller -o jsonpath="{.status.loadBalancer.ingress[0].ip}")" >> "$GITHUB_ENV"
            
            - name: Replace values in manifest files
              uses: cschleiden/replace-tokens@v1
              with:
                tokenPrefix: '_{_'
                tokenSuffix: '_}_'
                files: '["kubernetes/development/*.yaml"]'
              env:
                NAMESPACE: ${{ vars.NAMESPACE}}
                REPLICAS: 2
                IMAGE: ${{ vars.DOCKER_USERNAME}}/solar-system:latest
                DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME}}
                # INGRESS_IP: ${{ env.INGRESS_IP }}

            - name: Check manifest files after replacing placeholders
              run: cat kubernetes/development/*.yaml

